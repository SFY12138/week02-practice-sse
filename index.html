<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Document</title>
  </head>
  <body>
    <div class="flex justify-center items-center flex-col">
      <div
        id="msg"
        class="my-2 max-w-md px-3 rounded-md min-h-[34px] leading-[34px] tracking-widest bg-blue-50 border-l-4 border-blue-500"
      ></div>
      <button
        id="closeBtn"
        class="mt-3 px-6 py-2 text-sm font-medium text-white bg-gradient-to-br from-blue-500 to-blue-700 border-none rounded-lg cursor-pointer shadow-[0_2px_8px_rgba(33,150,243,0.35)] transition-all duration-150 ease-in-out hover:-translate-y-px hover:shadow-[0_4px_12px_rgba(33,150,243,0.45)] active:translate-y-0 active:shadow-[0_2px_6px_rgba(33,150,243,0.3)]"
      >
        断开连接
      </button>
    </div>

    <script>
      const msgEl = document.getElementById("msg");
      const eventSource = new EventSource("http://127.0.0.1:3000/api/sse");

      eventSource.onopen = () => {
        console.log("open");
      };

      eventSource.onmessage = (valueText) => {
        msgEl.textContent += valueText.data;
      };

      eventSource.onerror = (error) => {
        console.log("例如访问了一个不存在的端口：", error);
      };

      const closeConnection = () => {
        eventSource.close();
        console.log("close");
      };

      document
        .getElementById("closeBtn")
        .addEventListener("click", closeConnection);
    </script>
  </body>
</html>
